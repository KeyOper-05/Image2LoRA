# Image2LoRA SD 1.5 训练配置
pretrained_model_name_or_path: "pretrained_models/stable-diffusion-v1-5"

# 数据
train_data_meta: "data/metadata.jsonl"
train_data_dir: "sampled_100styles_150pairs_package"
resolution: 512
max_samples: 15000

# LightLoRA
rank: 1
network_alpha: 1.0
down_dim: 64
up_dim: 32

# Hypernetwork
decoder_blocks: 8
sample_iters: 4
dinov2_model: "dinov2_vitb14"
dinov2_model_path: "pretrained_models/dinov2-base"

# 训练
output_dir: "outputs/image2lora_sd15"
seed: 42
train_batch_size: 16
gradient_accumulation_steps: 1
num_train_epochs: 10
max_train_steps: -1
learning_rate: 1.0e-4
lr_scheduler: "cosine"
lr_warmup_steps: 500
adam_beta1: 0.9
adam_beta2: 0.999
adam_weight_decay: 0.01
adam_epsilon: 1.0e-8
max_grad_norm: 1.0
mixed_precision: "fp16"
gradient_checkpointing: true
text_drop_ratio: 0.1

# 日志与保存
logging_steps: 50
checkpointing_steps: 1000
checkpoints_total_limit: 5
report_to: "tensorboard"

# 推理验证
validation_steps: 1000
validation_prompt: "a beautiful landscape painting"
num_validation_images: 2
